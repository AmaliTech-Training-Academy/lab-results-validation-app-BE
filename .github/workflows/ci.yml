name: CI

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'feat/**'
      - 'chore/**'
      - 'hotfix/**'
    paths-ignore:
      - '**.md'
      - '**.txt'
      - 'docs/**'
      - '**.pdf'
      - '**.png'
      - '**.jpg'
      - '**.jpeg'
      - '**.gif'
      - '**.svg'
      - '**.drawio'
      - '**.puml'
      - 'diagrams/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '**.txt'
      - 'docs/**'
      - '**.pdf'
      - '**.png'
      - '**.jpg'
      - '**.jpeg'
      - '**.gif'
      - '**.svg'
      - '**.drawio'
      - '**.puml'
      - 'diagrams/**'
      - 'LICENSE'
      - '.gitignore'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Lint
        run: mvn checkstyle:check
        working-directory: labresultsvalidator

      - name: Run tests
        run: mvn test
        working-directory: labresultsvalidator

      - name: Build
        run: mvn clean package -DskipTests
        working-directory: labresultsvalidator
